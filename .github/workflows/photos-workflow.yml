name: "Google Photos ReVanced by elmendezz"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Dependencias
        run: sudo apt-get update && sudo apt-get install -y wget curl

      - name: Descargar Herramientas (Morphe + De-ReVanced)
        run: |
          # Descarga directa de las herramientas que me pasaste
          wget -q -O morphe-cli.jar "https://github.com/MorpheApp/morphe-cli/releases/download/v1.6.2/morphe-cli-1.6.2-all.jar"
          wget -q -O patches.mpp "https://github.com/RookieEnough/De-ReVanced/releases/download/v1.0.1/patches-1.0.1.mpp"
          wget -q -O integrations.apk "https://github.com/ReVanced/revanced-integrations/releases/download/v1.16.0/revanced-integrations-1.16.0.apk"

      - name: Generar Keystore (Firma mendez123)
        run: |
          keytool -genkey -v -keystore mendez.keystore -alias mendez_alias -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=PapiMendez, OU=Dev, O=elmendezz, L=Tijuana, S=BC, C=MX" \
          -storepass mendez123 -keypass mendez123

      - name: Obtener Google Photos Base
        run: |
          # Intentamos bajar la v6.71.0 que es compatible con estos parches
          curl -L -A "Mozilla/5.0" -o base.apk "https://github.com/mizsoula/ReVanced-Manager-Guides/raw/main/GooglePhotos-6.71.0.apk"
          
          if [ ! -s base.apk ]; then
            echo "Error: No se pudo descargar el APK base."
            exit 1
          fi

      - name: Parchear con Morphe CLI (Sintaxis Corregida)
        run: |
          # En Morphe:
          # -i: Archivo base
          # -o: Archivo de salida
          # -m: Patches (.mpp)
          # -p: Cambiar Package Name (com.elmendezz.gphotos)
          # --ks: Keystore
          
          java -jar morphe-cli.jar patch \
            -i base.apk \
            -o "Photos-ReVanced-elmendezz-${{ matrix.arch }}.apk" \
            -m patches.mpp \
            -p com.elmendezz.gphotos \
            --ks mendez.keystore \
            --ks-pass mendez123 \
            --ks-alias mendez_alias \
            --ks-key-pass mendez123 \
            --purge

      - name: Subir a Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "GPhotos-elmendezz-${{ github.run_id }}"
          name: "Google Photos Custom (Morphe Build)"
          files: Photos-ReVanced-elmendezz-${{ matrix.arch }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
