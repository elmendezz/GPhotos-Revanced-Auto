name: "Google Photos ReVanced Unified Build"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64-v8a, armeabi-v7a]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl coreutils

      - name: Download Build Tools
        run: |
          wget -q -O morphe-cli.jar "https://github.com/MorpheApp/morphe-cli/releases/download/v1.6.2/morphe-cli-1.6.2-all.jar"
          wget -q -O patches.mpp "https://github.com/RookieEnough/De-ReVanced/releases/download/v1.0.1/patches-1.0.1.mpp"
          wget -q -O integrations.apk "https://github.com/ReVanced/revanced-integrations/releases/download/v1.16.0/revanced-integrations-1.16.0.apk"

      - name: Generate Signing Keystore
        run: |
          keytool -genkey -v -keystore mendez.keystore -alias mendez_alias -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=PapiMendez, OU=Dev, O=elmendezz, L=Tijuana, S=BC, C=MX" \
          -storepass mendez123 -keypass mendez123

      - name: Fetch Base APK
        run: |
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/114.0.0.0 Safari/537.36" \
          -o base.apk "https://github.com/mizsoula/ReVanced-Manager-Guides/raw/main/GooglePhotos-6.71.0.apk"
          
          if [ ! -s base.apk ]; then
            echo "Base APK download failed or file is empty."
            exit 1
          fi

      - name: Execute Morphe Patching
        run: |
          java -jar morphe-cli.jar patch \
            --patches=patches.mpp \
            --out="Photos-ReVanced-elmendezz-${{ matrix.arch }}.apk" \
            --keystore=mendez.keystore \
            --keystore-password=mendez123 \
            --keystore-entry-alias=mendez_alias \
            --keystore-entry-password=mendez123 \
            --striplibs=${{ matrix.arch }} \
            --purge \
            base.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "GPhotos-Build-${{ github.run_id }}"
          name: "Google Photos ReVanced ${{ matrix.arch }}"
          files: Photos-ReVanced-elmendezz-${{ matrix.arch }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
