name: "Google Photos ReVanced Expert Build"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64-v8a]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl jq coreutils
          curl -L https://github.com/mgdm/htmlq/releases/latest/download/htmlq-x86_64-linux.tar.gz | tar xz
          sudo mv htmlq /usr/local/bin/

      - name: Download Infrastructure
        run: |
          wget -q -O morphe-cli.jar "https://github.com/MorpheApp/morphe-cli/releases/download/v1.6.2/morphe-cli-1.6.2-all.jar"
          wget -q -O patches.mpp "https://github.com/RookieEnough/De-ReVanced/releases/download/v1.0.1/patches-1.0.1.mpp"
          wget -q -O integrations.apk "https://github.com/ReVanced/revanced-integrations/releases/download/v1.16.0/revanced-integrations-1.16.0.apk"

      - name: Fetch Google Photos Base (Bypass Uptodown Store)
        run: |
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36"
          
          # 1. Obtener el DATA-CODE interno de Google Photos en Uptodown
          DATA_CODE=$(curl -s -L -A "$USER_AGENT" "https://google-photos.en.uptodown.com/android" | htmlq "#detail-app-name" --attribute data-code)
          echo "App Data Code: $DATA_CODE"

          # 2. Consultar el endpoint de versiones para obtener la URL de descarga de la v6.71.0
          # Replicando la lógica de j-hc: apps/{code}/versions/1
          VERSION_JSON=$(curl -s -L -A "$USER_AGENT" "https://google-photos.en.uptodown.com/android/apps/$DATA_CODE/versions/1")
          
          # Extraer el versionURL de la versión específica 6.71.0.604250000
          VERSION_URL=$(echo "$VERSION_JSON" | jq -r '.data[] | select(.version | contains("6.71.0")) | .versionURL')
          
          if [ -z "$VERSION_URL" ] || [ "$VERSION_URL" == "null" ]; then
            echo "No se encontró la versión en el JSON. Usando mirror directo de emergencia."
            DOWNLOAD_URL="https://cdn.apktool.club/Google%20Photos_6.71.0.604250000_apkpure.com.apk"
          else
            # 3. Obtener el ID final de descarga
            FINAL_PAGE=$(curl -s -L -A "$USER_AGENT" "$VERSION_URL")
            DOWNLOAD_ID=$(echo "$FINAL_PAGE" | htmlq "#detail-download-button" --attribute data-url)
            DOWNLOAD_URL="https://dw.uptodown.com/dwn/$DOWNLOAD_ID"
          fi

          echo "Descargando APK real desde: $DOWNLOAD_URL"
          
          # Descarga con cabeceras de seguridad para evitar que nos encajen la Store
          curl -L -A "$USER_AGENT" \
               -H "Referer: https://google-photos.en.uptodown.com/" \
               -o base.apk "$DOWNLOAD_URL"

          SIZE=$(stat -c%s base.apk)
          echo "Tamaño final: $SIZE bytes"
          if [ $SIZE -lt 50000000 ]; then
             echo "ERROR: Sigue bajando la Uptodown Store o un archivo corrupto."
             exit 1
          fi

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore mendez.keystore -alias mendez_alias -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=PapiMendez, OU=Dev, O=elmendezz, L=Tijuana, ST=BC, C=MX" \
          -storepass mendez123 -keypass mendez123

      - name: Patch APK
        run: |
          java -jar morphe-cli.jar patch \
            --patches=patches.mpp \
            --out="Photos-ReVanced-elmendezz-${{ matrix.arch }}.apk" \
            --keystore=mendez.keystore \
            --keystore-password=mendez123 \
            --keystore-entry-alias=mendez_alias \
            --keystore-entry-password=mendez123 \
            --striplibs=${{ matrix.arch }} \
            --purge \
            base.apk

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Build-${{ github.run_id }}"
          name: "Google Photos ReVanced"
          files: Photos-ReVanced-elmendezz-${{ matrix.arch }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
