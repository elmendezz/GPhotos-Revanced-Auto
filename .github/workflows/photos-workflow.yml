name: "Google Photos ReVanced Ultra-Robust Build"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64-v8a, armeabi-v7a]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y wget curl coreutils

      - name: Download Build Infrastructure
        run: |
          wget -q -O morphe-cli.jar "https://github.com/MorpheApp/morphe-cli/releases/download/v1.6.2/morphe-cli-1.6.2-all.jar"
          wget -q -O patches.mpp "https://github.com/RookieEnough/De-ReVanced/releases/download/v1.0.1/patches-1.0.1.mpp"
          wget -q -O integrations.apk "https://github.com/ReVanced/revanced-integrations/releases/download/v1.16.0/revanced-integrations-1.16.0.apk"

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore mendez.keystore -alias mendez_alias -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=PapiMendez, OU=Dev, O=elmendezz, L=Tijuana, ST=BC, C=MX" \
          -storepass mendez123 -keypass mendez123

      - name: Fetch Google Photos Base (v6.71.0)
        run: |
          # Usando un mirror directo que permite wget/curl sin bloqueos de JS
          echo "Descargando Google Photos desde Uptodown/Mirror alternativo..."
          
          # Intentamos descarga desde un repositorio de APKs persistente
          # Si falla, usamos el mirror de APKPure/Uptodown emulado
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36" \
          -o base.apk "https://cdn.apktool.club/Google%20Photos_6.71.0.604250000_apkpure.com.apk"
          
          # Verificación de integridad (Si es menor a 50MB, falló)
          FILESIZE=$(stat -c%s "base.apk")
          if [ $FILESIZE -lt 50000000 ]; then
            echo "Reintentando con mirror secundario..."
            wget -U "Mozilla/5.0" -O base.apk "https://github.com/noob-vanced/revanced-binaries/releases/download/v2024.03.15/GooglePhotos-6.71.0.apk"
          fi
          
          if [ ! -s base.apk ] || [ $(stat -c%s "base.apk") -lt 50000000 ]; then
            echo "ERROR: El APK no se descargó correctamente. Tamaño: $FILESIZE"
            exit 1
          fi

      - name: Execute Morphe Patching
        run: |
          # Comando exacto para Morphe CLI 1.6.2
          java -jar morphe-cli.jar patch \
            --patches=patches.mpp \
            --out="Photos-ReVanced-elmendezz-${{ matrix.arch }}.apk" \
            --keystore=mendez.keystore \
            --keystore-password=mendez123 \
            --keystore-entry-alias=mendez_alias \
            --keystore-entry-password=mendez123 \
            --striplibs=${{ matrix.arch }} \
            --purge \
            base.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Build-${{ github.run_id }}"
          name: "G-Photos ReVanced (elmendezz)"
          files: Photos-ReVanced-elmendezz-${{ matrix.arch }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
