name: Google Photos ReVanced Unificado

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Descargar Herramientas ReVanced
        run: |
          get_latest_asset() {
            curl -s "https://api.github.com/repos/$1/releases/latest" | \
            jq -r ".assets[] | select(.name | contains(\"$2\")) | .browser_download_url" | head -n 1
          }

          CLI_URL=$(get_latest_asset "ReVanced/revanced-cli" ".jar")
          PATCHES_URL=$(get_latest_asset "ReVanced/revanced-patches" ".jar")
          INTEGRATIONS_URL=$(get_latest_asset "ReVanced/revanced-integrations" ".apk")

          echo "Descargando CLI de: $CLI_URL"
          wget -q -O revanced-cli.jar "$CLI_URL"
          wget -q -O revanced-patches.jar "$PATCHES_URL"
          wget -q -O revanced-integrations.apk "$INTEGRATIONS_URL"

      - name: Preparar Keystore Temporal
        run: |
          keytool -genkey -v -keystore revanced.keystore -alias revanced -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=elmendezz, OU=ReVanced, O=ReVanced, L=Tijuana, S=BC, C=MX" \
          -storepass password -keypass password

      - name: Descargar Google Photos Base
        run: |
          # NOTA: ReVanced requiere el APK base (no split/bundle) para parchear correctamente.
          # Como Google Photos suele ser bundle, asegúrate de proveer un link directo a un APK "nodpi".
          # Por ahora, este paso requiere que definas de dónde bajar el APK base.
          echo "Buscando APK base para ${{ matrix.arch }}..."
          # Ejemplo (Debes poner un link real a un APK compatible):
          # wget -q -O base.apk "https://tu-link-directo-a-photos-nodpi.apk"

      - name: Parchear y Firmar APK
        run: |
          # Usamos el CLI para parchear. 
          # Se incluye la firma automática usando el keystore generado arriba.
          java -jar revanced-cli.jar patch \
            --patches revanced-patches.jar \
            --merge revanced-integrations.apk \
            --target com.google.android.apps.photos \
            --keystore revanced.keystore \
            --keystore-password password \
            --keystore-entry-alias revanced \
            --keystore-entry-password password \
            --out "Photos-ReVanced-${{ matrix.arch }}.apk" \
            base.apk

      - name: Subir a Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}
          name: "Google Photos ReVanced (Build ${{ github.run_id }})"
          files: Photos-ReVanced-${{ matrix.arch }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
