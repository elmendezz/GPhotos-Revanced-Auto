name: "Google Photos ReVanced by elmendezz"

on:
  workflow_dispatch: # Ejecución manual desde la pestaña Actions

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Definimos las arquitecturas que pediste
        arch: [arm64-v8a, armeabi-v7a]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Herramientas de Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y jq wget curl

      - name: Obtener Herramientas ReVanced (Anti-Error)
        run: |
          # Función para extraer URLs sin que jq de errores de null
          get_url() {
            curl -sL "https://api.github.com/repos/$1/releases/latest" | \
            jq -r ".assets[] | select(.name | contains(\"$2\")) | .browser_download_url" | head -n 1
          }

          CLI_URL=$(get_url "ReVanced/revanced-cli" ".jar")
          PATCHES_URL=$(get_url "ReVanced/revanced-patches" ".jar")
          INTEGRATIONS_URL=$(get_url "ReVanced/revanced-integrations" ".apk")

          echo "Descargando CLI: $CLI_URL"
          wget -q -O revanced-cli.jar "$CLI_URL"
          
          echo "Descargando Patches: $PATCHES_URL"
          wget -q -O revanced-patches.jar "$PATCHES_URL"
          
          echo "Descargando Integrations: $INTEGRATIONS_URL"
          wget -q -O revanced-integrations.apk "$INTEGRATIONS_URL"

      - name: Generar Keystore (Firma Digital)
        run: |
          # Generamos una llave privada para firmar el APK automáticamente
          keytool -genkey -v -keystore elmendezz.keystore -alias mendez_alias -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=PapiMendez, OU=Dev, O=elmendezz, L=Tijuana, S=BC, C=MX" \
          -storepass mendez123 -keypass mendez123

      - name: Descargar APK Base de Google Photos
        run: |
          # Aquí necesitamos el APK original de Google Photos (versión nodpi sugerida)
          # NOTA: Si tienes un link directo de un APK (no bundle), ponlo aquí.
          # Como ejemplo, usaremos una variable para el link.
          # Google Photos com.google.android.apps.photos
          echo "Descargando APK original de Photos para ${{ matrix.arch }}..."
          
          # Puedes subir el base.apk a tu repo o usar un link de confianza aquí:
          # wget -q -O base.apk "TU_LINK_AQUI"
          
          # Si no tienes link, el proceso fallará en el siguiente paso. 
          # Asegúrate de que el archivo se llame 'base.apk'

      - name: Ejecutar Parcheo ReVanced
        run: |
          # --target: Indicamos el paquete original
          # --pkg-name: Cambiamos el ID del paquete a com.elmendezz.gphotos
          # --keystore: Usamos el archivo generado arriba para firmar
          
          java -jar revanced-cli.jar patch \
            --patches revanced-patches.jar \
            --merge revanced-integrations.apk \
            --target com.google.android.apps.photos \
            --pkg-name com.elmendezz.gphotos \
            --keystore elmendezz.keystore \
            --keystore-password mendez123 \
            --keystore-entry-alias mendez_alias \
            --keystore-entry-password mendez123 \
            --out "Photos-ReVanced-elmendezz-${{ matrix.arch }}.apk" \
            base.apk

      - name: Crear Release y Subir APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_id }}"
          name: "Google Photos ReVanced Custom - ${{ matrix.arch }}"
          body: |
            Build realizado con onda.
            - **Package Name:** com.elmendezz.gphotos
            - **Arquitectura:** ${{ matrix.arch }}
            - **Firmado:** Sí (Keystore auto-generado)
          files: |
            Photos-ReVanced-elmendezz-${{ matrix.arch }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
